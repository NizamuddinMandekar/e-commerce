<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      const pathname = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const segments = pathname.split('/').filter(Boolean);
      const repoBase = segments.length > 0 ? '/' + segments[0] : '';
      const route = segments.length > 1 ? '/' + segments.slice(1).join('/') : '';
      const redirectTo = `${repoBase}/#${route}${search}${hash}`;
      window.location.replace(redirectTo);
    </script>
  </head>
  <body>
    <p>Redirecting to the app…</p>
    <p>If you are not redirected, <a id="link" href="">click here</a>.</p>
    <script>
      const pathname = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const segments = pathname.split('/').filter(Boolean);
      const repoBase = segments.length > 0 ? '/' + segments[0] : '';
      const route = segments.length > 1 ? '/' + segments.slice(1).join('/') : '';
      document.getElementById('link').href = `${repoBase}/#${route}${search}${hash}`;
    </script>
  </body>
</html>
